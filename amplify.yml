version: 1
applications:
  - appRoot: apps/web
    env:
      variables:
        NODE_ENV: production
        AMPLIFY_MONOREPO_APP_ROOT: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing monorepo dependencies from root..."
            - cd ../..
            - npm ci
            - echo "Cleaning Next.js cache..."
            - rm -rf apps/web/.next
        build:
          commands:
            - echo "Building Next.js app..."
            - cd ../..
            - cd apps/web
            - npx next build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
