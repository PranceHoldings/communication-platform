version: 1
applications:
  - appRoot: apps/web
    env:
      variables:
        NODE_ENV: production
        AMPLIFY_MONOREPO_APP_ROOT: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing monorepo dependencies from project root..."
            - cd $CODEBUILD_SRC_DIR
            - npm ci
            - echo "Dependencies installed. Total packages:"
            - npm list --depth=0 | wc -l
        build:
          commands:
            - echo "Building Next.js app from apps/web..."
            - cd $CODEBUILD_SRC_DIR/apps/web
            - npm run build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
