version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing monorepo dependencies..."
            - npm install
            - echo "Generating Prisma Client..."
            - npm run db:generate
            - echo "Dependencies installed successfully"
        build:
          commands:
            - echo "Building Next.js app in apps/web..."
            - cd apps/web
            - npm run build
      artifacts:
        baseDirectory: apps/web
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/node_modules/**/*
          - apps/web/.next/cache/**/*
    env:
      variables:
        NODE_ENV: production
        AMPLIFY_MONOREPO_APP_ROOT: apps/web
