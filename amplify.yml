version: 1
applications:
  - appRoot: apps/web
    env:
      variables:
        NODE_ENV: production
        AMPLIFY_MONOREPO_APP_ROOT: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Current directory before navigation:"
            - pwd
            - echo "Installing monorepo dependencies from project root..."
            - cd ../..
            - pwd
            - ls -la | grep package-lock.json
            - npm ci
            - echo "Dependencies installed successfully"
        build:
          commands:
            - echo "Building Next.js app from apps/web..."
            - echo "Current directory before navigation:"
            - pwd
            - cd apps/web
            - echo "Now in apps/web:"
            - pwd
            - npm run build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
